<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Vegges and fruits</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#f4f6f9}

/* AUTH */
.auth{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2e7d32,#66bb6a);
}

.box{
background:white;
padding:25px;
border-radius:15px;
width:280px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.box h2{margin-bottom:5px}
.box small{color:gray}

.box input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

.box button{
width:100%;
padding:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.switch{
margin-top:10px;
font-size:13px;
color:#2e7d32;
cursor:pointer;
}

/* MAIN */
#main{display:none}

/* HEADER */
header{
text-align:center;
padding:15px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
font-size:20px;
font-weight:600;
}

.slogan{
font-size:12px;
color:gray;
margin-top:3px;
}

/* TABS */
.tabs{
margin-top:10px;
}

.tabs button{
padding:6px 12px;
border:none;
background:#eee;
margin:0 5px;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

.tabs button.active{
background:#2e7d32;
color:white;
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:8px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:90px;
object-fit:cover;
border-radius:8px;
}

.card h4{font-size:14px;margin:5px 0;}
.card p{font-size:13px;}

.card button{
font-size:12px;
padding:6px;
margin-top:5px;
}

/* CART */
.cart-btn{
position:fixed;
bottom:15px;
right:15px;
background:#ff5722;
color:white;
padding:12px;
border-radius:50%;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.bill{
background:white;
padding:15px;
border-radius:10px;
width:280px;
}

.item{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:13px;
}

.item button{
font-size:11px;
margin-left:3px;
}

.close{
float:right;
cursor:pointer;
color:red;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth" id="authBox">

<div class="box" id="loginForm">
<h2>🥬 Golden Vegges & fruits</h2>
<small>Freshness at your doorstep 🌿</small>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p class="switch" onclick="showSignup()">Create account</p>
</div>

<div class="box" id="signupForm" style="display:none">
<h2>Create Account</h2>
<input id="signUser" placeholder="Username">
<input id="signPass" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<p class="switch" onclick="showLogin()">Back to Login</p>
</div>

</div>

<!-- MAIN -->
<div id="main">

<header>
<div class="logo">🥬 Golden Vegges & fruits</div>
<div class="slogan">Freshness at your doorstep 🌿</div>

<div class="tabs">
<button id="vegBtn" class="active" onclick="show('veg')">Veg</button>
<button id="fruitBtn" onclick="show('fruit')">Fruits</button>
</div>
</header>

<div id="products" class="grid"></div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="modal" id="cartModal">
<div class="bill">
<span class="close" onclick="closeCart()">✖</span>
<h3>Cart</h3>
<div id="items"></div>
<h4>Total: ₹<span id="total">0</span></h4>
<button onclick="checkout()">Checkout</button>
</div>
</div>

</div>

<script>

// DEFAULT DEMO ACCOUNT
if(!localStorage.getItem("user")){
localStorage.setItem("user","admin");
localStorage.setItem("pass","1234");
}

// SWITCH
function showSignup(){loginForm.style.display="none";signupForm.style.display="block";}
function showLogin(){signupForm.style.display="none";loginForm.style.display="block";}

// AUTH
function signup(){
localStorage.setItem("user",signUser.value);
localStorage.setItem("pass",signPass.value);
alert("Account Created!");
showLogin();
}

function login(){
let savedUser = localStorage.getItem("user");
let savedPass = localStorage.getItem("pass");

if(loginUser.value === savedUser && loginPass.value === savedPass){
authBox.style.display="none";
main.style.display="block";
alert("Welcome to Golden Veg 🥬");
}else{
alert("Wrong Username or Password ❌");
}
}

function show(type){
vegBtn.classList.remove("active");
fruitBtn.classList.remove("active");
(type=="veg"?vegBtn:fruitBtn).classList.add("active");

let data = (type=="veg") ? veg : fruit;
products.innerHTML="";

data.forEach(p=>{
products.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick='add(${JSON.stringify(p)})'>Add</button>
</div>`;
});
}

// CART
let cart=[];

function add(p){
let item=cart.find(x=>x.name==p.name);
if(item)item.qty++;
else cart.push({...p,qty:1});
}

function toggleCart(){cartModal.style.display="flex";render();}
function closeCart(){cartModal.style.display="none";}

function render(){
items.innerHTML="";
let total=0;

cart.forEach((i,index)=>{
items.innerHTML+=`
<div class="item">
<span>${i.name} x${i.qty}</span>
<div>
<button onclick="dec(${index})">-</button>
<button onclick="inc(${index})">+</button>
<button onclick="del(${index})">❌</button>
</div>
</div>`;
total+=i.price*i.qty;
});

document.getElementById("total").innerText=total;
}

function inc(i){cart[i].qty++;render();}
function dec(i){cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1); render();}
function del(i){cart.splice(i,1);render();}

function checkout(){
alert("Order placed!");
cart=[];
closeCart();
}

// INIT
show('veg');

</script>
